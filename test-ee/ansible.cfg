[defaults]
inventory = inventory
remote_user = devops
collections_path = ./:/usr/share/ansible/collections

[privilege_escalation]
become = false
become_method = sudo
become_user = root
become_ask_pass = false

[galaxy]
server_list = community, rh-certified, published, validated, galaxy
